name: Weekly Digest

on:
  schedule:
    - cron: '0 9 * * 0'   # Every Sunday at 12:00 MSK (09:00 UTC)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Weekly Digest
      timeout-minutes: 15
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
      run: python weekly_digest.py

    - name: Commit and Push Digest
      run: |
        git config --global user.name 'boto-vlad'
        git config --global user.email 'bot@example.com'
        git add digest.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "Update digest.json [skip ci]" && git push)
